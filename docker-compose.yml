version: '3.8'

services:
  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - todo-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/todos.db
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  todo-data:
    driver: local
